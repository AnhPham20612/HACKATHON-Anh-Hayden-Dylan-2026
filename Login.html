<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PacificCheck — Log In</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="PacificCheck/PacificCheck.css">
</head>
<body>

<div class="login-card">

  <!-- Branding -->
  <div class="branding">
    <div class="logo-badge">
      <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 3L22 8V18L13 23L4 18V8L13 3Z" stroke="#F2A900" stroke-width="1.5" fill="none"/>
        <path d="M13 7L18 10V16L13 19L8 16V10L13 7Z" fill="#F2A900" opacity="0.3"/>
        <circle cx="13" cy="13" r="2.5" fill="#F2A900"/>
      </svg>
    </div>
    <div class="brand-text">
      <h1>PacificCheck</h1>
      <p>University of the Pacific</p>
    </div>
  </div>

  <div class="divider"></div>

  <p class="form-heading">Log in to your account</p>

  <!-- Email field -->
  <div class="field">
    <label for="email">UOP email</label>
    <input
      type="email"
      id="email"
      name="email"
      placeholder="yourname@u.pacific.edu"
      autocomplete="email"
      oninput="clearError()"
    />
    <p class="email-hint">Must end with @u.pacific.edu</p>
  </div>

  <!-- Password field -->
  <div class="field">
    <label for="password">Password</label>
    <input
      type="password"
      id="password"
      name="password"
      placeholder="Enter your password"
      autocomplete="current-password"
      oninput="clearError()"
      onkeydown="if(event.key === 'Enter') handleLogin()"
    />
  </div>

  <!-- Error message -->
  <div class="error-msg" id="error-msg"></div>

  <!-- Login button -->
  <button class="login-btn" id="login-btn" onclick="handleLogin()">
    Log in
  </button>

  <!-- Footer -->
  <p class="footer-note">
    Access is restricted to students and staff with a valid<br/>
    <strong>@u.pacific.edu</strong> email address.
  </p>

</div>

<script>
  function clearError() {
    const err = document.getElementById('error-msg');
    err.textContent = '';
    err.classList.remove('visible');
  }

  function showError(msg) {
    const err = document.getElementById('error-msg');
    err.textContent = msg;
    err.classList.add('visible');
  }

  function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');

    clearError();

    // Basic front-end validation
    if (!email) {
      return showError('Please enter your UOP email address.');
    }

    if (!email.toLowerCase().endsWith('@u.pacific.edu')) {
      return showError('Only @u.pacific.edu email addresses are allowed.');
    }

    if (!password) {
      return showError('Please enter your password.');
    }

    // Show loading state while waiting for backend
    btn.textContent = 'Logging in...';
    btn.classList.add('loading');

    // TODO: replace this block with your team's real API call, for example:
    //
    // fetch('/api/login', {
    //   method: 'POST',
    //   headers: { 'Content-Type': 'application/json' },
    //   body: JSON.stringify({ email, password })
    // })
    // .then(r => r.json())
    // .then(data => {
    //   if (data.success) {
    //     window.location.href = 'pacificcheck.html'; // redirect to main app
    //   } else {
    //     showError(data.message || 'Invalid email or password.');
    //     btn.textContent = 'Log in';
    //     btn.classList.remove('loading');
    //   }
    // })
    // .catch(() => {
    //   showError('Something went wrong. Please try again.');
    //   btn.textContent = 'Log in';
    //   btn.classList.remove('loading');
    // });

    // Temporary simulation — remove once backend is ready
    setTimeout(() => {
      btn.textContent = 'Log in';
      btn.classList.remove('loading');
      // Simulates a successful login by redirecting to the main app page
      window.location.href = 'pacificcheck.html';
    }, 1200);
  }
</script>

</body>
</html>
